<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion en cours... — Ustad</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:'Inter',sans-serif;background:#f9fafb;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{text-align:center;padding:40px;}
.spinner{width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#1a56db;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
p{font-size:.9rem;color:#6b7280;}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Connexion en cours...</p>
</div>
<script>
const SB_URL  = 'https://phcsftysslpiiisqjwhi.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoY3NmdHlzc2xwaWlpc3Fqd2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjU1ODMsImV4cCI6MjA4OTIwMTU4M30.8reYXjUdrgjLpxgsYsAfP3H0yf_wTABQHZDYWY_fS8Q';
const sb = supabase.createClient(SB_URL, SB_ANON);

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'auth.html'; return; }

  // Récupère le profil
  const { data: profile } = await sb
    .from('profiles').select('role').eq('id', session.user.id).single();

  // Si premier login Google → crée le profil avec le rôle stocké
  if (!profile) {
    const pendingRole = localStorage.getItem('pending_role') || 'student';
    localStorage.removeItem('pending_role');
    await sb.from('profiles').insert({
      id:        session.user.id,
      role:      pendingRole,
      full_name: session.user.user_metadata?.full_name || session.user.email,
      email:     session.user.email,
    });
    window.location.href = pendingRole === 'tutor' ? 'dashboard-tutor.html' : 'dashboard-student.html';
    return;
  }

  localStorage.removeItem('pending_role');
  window.location.href = profile.role === 'tutor' ? 'dashboard-tutor.html' : 'dashboard-student.html';
})();
</script>
</body>
</html>
